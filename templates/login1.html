{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="{% static 'static/home/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap JS Bundle (includes Popper.js) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>



    <title>Vitacare Login & Registration</title>

    <style>
      body {
        background: url("{% static 'home/corona.jpg' %}");
        background-size: cover;
        background-repeat: no-repeat;
        background-attachment: fixed;
        
      }
      option{
        color:black;
      }
      
      


    </style>
</head>


<body>
{% if messages %}
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    {% endfor %}
{% endif %}



<div class="wrapper">
    <nav class="nav">
        <!-- <div class="nav-logo">
            <p><small>Wlecome to VitCare hospital website</small> .</p>
        </div> -->
        
        <div class="nav-button">
            <button class="btn white-btn" id="loginBtn" onclick="login()">Sign In</button>
            <label for=""></label>
            <button class="btn" id="registerBtn" onclick="register()">Sign Up</button>
        </div>
        <div class="nav-menu-btn">
            <i class="bx bx-menu" onclick="myMenuFunction()"></i>
        </div>
    </nav>

<!-- Form box-->    
    <div class="form-box">

               <!-- login form -->
        
            <div class="login-container" id="login">
                <form  action="{% url 'login_user' %}" class="form" method="post">
                    {% csrf_token %}
                    <div>
                            <div class="top" style="position:realative;top:10px;">
                                <header>Login</header>
                            </div>
                            <div class="input-box">
                                <input type="text" class="input-field" placeholder="Username or Email" name="username" required>
                                <i class="bx bx-user"></i>
                            </div>
                            <div class="input-box">
                                <input type="password" class="input-field" placeholder="Password" name="password" required maxlength="8">
                                <i class="bx bx-lock-alt"></i>
                            </div>
                            <div class="input-box">
                                <input type="submit" class="submit" value="Sign In">
                            </div>
                            <div class="top">
                                <!-- <label for="" class="btn text-white" style="position:realative;top:10px;"><b><center>If You're new here , <a href="{% url 'login_page' %}">Please Sign Up...</a></center></b></label> -->


                            </div>
                    </div>  
                </form>           
                
            </div>
        

        <!-- registration form -->
        
            <div class="register-container" id="register">
                <form action="{% url 'register_user' %}" method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div>
                            <div class="two-forms">
                        <div class="input-box">
                            <input type="text" class="input-field" placeholder="First name" name="fname" >
                            <i class="bx bx-user"></i>
                        </div>
                        <div class="input-box">
                            <input type="text" class="input-field" placeholder="Last name" name="lname" >
                            <i class="bx bx-user-circle"></i>

                        </div>
                    </div>
                    <div class="two-forms">
                        <div class="input-box">
                            <input type="email" class="input-field" placeholder="Email"  name="email">
                            <i class="bx bx-envelope"></i>
                        </div>
                        
                        <div class="input-box">
                            <input type="text" class="input-field" placeholder="username"  name="puser">
                            <i class="bx bx-envelope"></i>

                        </div>
                        
                    </div>
                    <div class="two-forms">
                        <div class="input-box">
                            <input type="file" class="input-field" placeholder="Profiel image" name="pimage" style="padding:10px;left:50px;" >
                            <!-- <i class="bx bx-image"></i> -->
                        </div>
                        <div class="input-box">
                            <input type="password" class="input-field" placeholder="Password" name="ppassword" maxlength="8" required>
                            <i class="bx bx-lock-alt"></i>
                        </div>
                        
                    </div>
                    <div class="two-forms">
                        <div class="input-box">
                            <input type="password" class="input-field" placeholder="Confirm Password" name="cpass" maxlength="8" required>
                            <i class="bx bx-lock-alt"></i>
                        </div>

                        <div class="input-box">
                            <input type="text" class="input-field" placeholder="Address" name="paddress" >
                            <i class="bx bx-map"></i>

                        </div>
                    </div>
                    <div class="input-box">
                        <select class="input-field" name="role" required>
                            <option value="" disabled selected>Select Role</option>
                            <option value="patient">Patient</option>
                            <option value="doctor">Doctor</option>
                        </select>
                    </div>

                    
                    <div class="input-box" style="padding:5px;">
                        <input type="submit" class="submit" value="Register">
                        

                    </div> 
                    </div>
                </form>     
            </div>         
              
    </div> 


<script>
   
   function myMenuFunction() {
    var i = document.getElementById("navMenu");

    if(i.className === "nav-menu") {
        i.className += " responsive";
    } else {
        i.className = "nav-menu";
    }
   }
 
</script>

<script>

    var a = document.getElementById("loginBtn");
    var b = document.getElementById("registerBtn");
    var x = document.getElementById("login");
    var y = document.getElementById("register");

    function login() {
        x.style.left = "4px";
        y.style.right = "-520px";
        a.className += " white-btn";
        b.className = "btn";
        x.style.opacity = 1;
        y.style.opacity = 0;
    }

    function register() {
        x.style.left = "-510px";
        y.style.right = "5px";
        a.className = "btn";
        b.className += " white-btn";
        x.style.opacity = 0;
        y.style.opacity = 1;
    }
    

</script>


</body>
</html>
